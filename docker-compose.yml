services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
      - tg-bot

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: govori
      POSTGRES_USER: govori
      POSTGRES_PASSWORD: Shamil2004!
    volumes:
      - govori_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govori"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    expose:
      - "3000"

  tg-bot:
    build: ./apps/tg-bot
    environment:
      - BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_BASE_URL=http://api:4000
      - API_SERVICE_SECRET=${TELEGRAM_BOT_SERVICE_SECRET:-}
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET}
      - WEB_ORIGIN=${WEB_ORIGIN}
      - WEBHOOK_PATH=/telegram/webhook
    depends_on:
      - api
      - redis
    restart: unless-stopped
    expose:
      - "8080"

volumes:
  govori_pg_data:
  caddy_data:
  caddy_config:
